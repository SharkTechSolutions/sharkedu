<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launching Soon</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .loader {
            border: 5px solid rgba(255, 255, 255, 0.2);
            border-top: 5px solid #fff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .footer {
            margin-top: 30px;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            border-radius: 25px;
            background: #fff;
            color: #2a5298;
            font-weight: 500;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ddd;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1> Launching Soon</h1>
        <p>Our website is currently under construction.<br>We’re working hard to bring you something amazing!</p>

        <div class="loader"></div>

        <!-- Updated Button -->
        <a href="https://sharktechsolutions.in/" class="btn">Product of Sharktech</a>

        <div class="footer">
            © 2026 Sharktech Solutions
        </div>
    </div>
</body>
</html>
